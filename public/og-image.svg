<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Logo mark -->
  <g transform="translate(100, 165)">
    <!-- Outer frame -->
    <rect x="4" y="4" width="292" height="292" fill="none" stroke="#1A1A2E" stroke-width="5"/>
    <!-- Corner brackets: top-left -->
    <line x1="4" y1="34" x2="4" y2="4" stroke="#E87040" stroke-width="9"/>
    <line x1="4" y1="4" x2="34" y2="4" stroke="#E87040" stroke-width="9"/>
    <!-- Corner brackets: top-right -->
    <line x1="296" y1="34" x2="296" y2="4" stroke="#E87040" stroke-width="9"/>
    <line x1="296" y1="4" x2="266" y2="4" stroke="#E87040" stroke-width="9"/>
    <!-- Corner brackets: bottom-left -->
    <line x1="4" y1="266" x2="4" y2="296" stroke="#E87040" stroke-width="9"/>
    <line x1="4" y1="296" x2="34" y2="296" stroke="#E87040" stroke-width="9"/>
    <!-- Corner brackets: bottom-right -->
    <line x1="296" y1="266" x2="296" y2="296" stroke="#E87040" stroke-width="9"/>
    <line x1="296" y1="296" x2="266" y2="296" stroke="#E87040" stroke-width="9"/>
    <!-- Top-left square -->
    <rect x="44" y="44" width="130" height="130" fill="none" stroke="#1A1A2E" stroke-width="9"/>
    <!-- Bottom-right square -->
    <rect x="126" y="126" width="130" height="130" fill="none" stroke="#1A1A2E" stroke-width="9"/>
    <!-- Intersection fill -->
    <rect x="126" y="126" width="48" height="48" fill="#FDF0E8"/>
  </g>

  <!-- Text -->
  <text x="480" y="255" font-family="Poppins, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#1A1A2E">Realty Pilot Suite</text>
  <text x="480" y="335" font-family="Poppins, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#E87040">VDR</text>
  <text x="484" y="400" font-family="Poppins, system-ui, -apple-system, sans-serif" font-size="28" fill="#9CA3AF">Secure document sharing for due diligence,</text>
  <text x="484" y="438" font-family="Poppins, system-ui, -apple-system, sans-serif" font-size="28" fill="#9CA3AF">M&amp;A, and fundraising.</text>
</svg>
