<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F1EB"/>

  <!-- Logo mark (overlapping squares, large) -->
  <g transform="translate(120, 180)">
    <!-- Top-left square -->
    <rect x="0" y="0" width="180" height="180" fill="none" stroke="#8EAB87" stroke-width="14"/>
    <!-- Bottom-right square -->
    <rect x="90" y="90" width="180" height="180" fill="none" stroke="#4E7252" stroke-width="14"/>
    <!-- Intersection fill -->
    <rect x="90" y="90" width="90" height="90" fill="#C8DBC5"/>
  </g>

  <!-- Text content -->
  <text x="480" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="#1E1B14">Open VDR</text>
  <text x="480" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="40" fill="#4E7252">Virtual Data Room</text>
  <text x="480" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#6B7280">Secure document sharing for due diligence,</text>
  <text x="480" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#6B7280">M&amp;A, and fundraising.</text>
</svg>
